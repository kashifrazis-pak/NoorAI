<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c3e2cd" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#c3e2cd" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="moonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#40915f"/>
      <stop offset="100%" stop-color="#265d3c"/>
    </linearGradient>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64af7f"/>
      <stop offset="100%" stop-color="#40915f"/>
    </linearGradient>
  </defs>

  <!-- Soft background glow -->
  <circle cx="32" cy="32" r="30" fill="url(#glow)"/>

  <!-- Crescent moon -->
  <path d="M32 8
    A24 24 0 1 1 32 56
    A18 18 0 1 0 32 8Z"
    fill="url(#moonGrad)" opacity="0.95"/>

  <!-- 8-pointed star (two overlapping squares rotated 45°) -->
  <!-- Square 1 -->
  <rect x="27" y="20" width="10" height="10" rx="1.5"
        fill="url(#starGrad)" transform="rotate(0 32 25)"/>
  <!-- Square 2 rotated 45° -->
  <rect x="27" y="20" width="10" height="10" rx="1.5"
        fill="url(#starGrad)" transform="rotate(45 32 25)"/>

  <!-- Dot of light -->
  <circle cx="32" cy="25" r="2.5" fill="white" opacity="0.9"/>
</svg>
